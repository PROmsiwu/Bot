<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>مساعد ذكي</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#080810; --s1:#10101e; --s2:#17172a; --s3:#1e1e35;
      --border:rgba(255,255,255,0.07); --acc:#7c6fff; --acc2:#ff6b9d;
      --acc3:#00d4aa; --text:#ececf4; --muted:#6b6b90; --r:20px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;height:100dvh;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
    body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 50% at 20% 10%,rgba(124,111,255,.12) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 85% 85%,rgba(255,107,157,.09) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 60% 40%,rgba(0,212,170,.06) 0%,transparent 70%);pointer-events:none}
    .app{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}

    /* HEADER */
    header{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(16,16,30,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-shrink:0}
    .av{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 0 20px rgba(124,111,255,.35);position:relative}
    .av::after{content:'';position:absolute;bottom:-2px;right:-2px;width:11px;height:11px;border-radius:50%;background:#22c55e;border:2px solid var(--bg);animation:blink 2.5s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .hinfo h1{font-size:15px;font-weight:800}
    .hinfo p{font-size:11px;color:var(--muted);margin-top:1px}
    .hbtn{margin-right:auto;background:var(--s3);border:1px solid var(--border);color:var(--muted);padding:7px 12px;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
    .hbtn:hover{color:var(--acc);border-color:var(--acc)}

    /* SETUP */
    .setup{margin:10px 16px 0;background:rgba(255,107,157,.08);border:1px solid rgba(255,107,157,.2);border-radius:14px;padding:13px 15px;font-size:13px;line-height:1.7;display:none;flex-shrink:0}
    .setup.show{display:block}
    .setup b{color:var(--acc2)}
    .setup a{color:var(--acc);text-decoration:none}
    .krow{display:flex;gap:8px;margin-top:10px}
    .krow input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:13px;padding:9px 12px;outline:none;transition:border-color .2s}
    .krow input:focus{border-color:var(--acc)}
    .krow input::placeholder{color:var(--muted)}
    .krow button{background:linear-gradient(135deg,var(--acc),#a78bff);border:none;border-radius:10px;color:#fff;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;padding:9px 16px;cursor:pointer;white-space:nowrap;transition:opacity .2s}
    .krow button:hover{opacity:.85}

    /* CHAT */
    .chat{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 14px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
    .chat::-webkit-scrollbar{width:3px}
    .chat::-webkit-scrollbar-thumb{background:var(--s3);border-radius:99px}

    /* WELCOME */
    .welcome{margin:auto;text-align:center;padding:20px 10px;animation:fadeUp .5s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .wicon{font-size:56px;display:block;margin-bottom:14px;filter:drop-shadow(0 0 24px rgba(124,111,255,.6));animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .welcome h2{font-size:24px;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,var(--acc),var(--acc2),var(--acc3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .welcome p{color:var(--muted);font-size:14px;line-height:1.6}
    .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:18px}
    .chip{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:8px 15px;border-radius:99px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap}
    .chip:hover{border-color:var(--acc);color:var(--acc);background:rgba(124,111,255,.1);transform:translateY(-1px)}

    /* MESSAGES */
    .msg{display:flex;flex-direction:column;max-width:82%;animation:fadeUp .25s ease}
    .msg.user{align-self:flex-start}
    .msg.ai{align-self:flex-end}
    .bubble{padding:11px 15px;border-radius:var(--r);font-size:14.5px;line-height:1.7;word-break:break-word;white-space:pre-wrap}
    .msg.user .bubble{background:linear-gradient(135deg,var(--acc) 0%,#a78bff 100%);color:#fff;border-bottom-right-radius:5px;box-shadow:0 4px 20px rgba(124,111,255,.3)}
    .msg.ai .bubble{background:var(--s2);border:1px solid var(--border);border-bottom-left-radius:5px}
    .msg-time{font-size:10px;color:var(--muted);margin-top:4px;padding:0 4px}
    .msg.user .msg-time{text-align:right}
    .msg.ai .msg-time{text-align:left}

    /* TYPING */
    .typing{display:none;align-self:flex-end;animation:fadeUp .25s ease}
    .typing.show{display:flex}
    .typing-bub{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);border-bottom-left-radius:5px;padding:13px 18px;display:flex;gap:5px;align-items:center}
    .typing-bub span{width:7px;height:7px;border-radius:50%;background:var(--acc);animation:dot 1.4s infinite}
    .typing-bub span:nth-child(2){animation-delay:.2s}
    .typing-bub span:nth-child(3){animation-delay:.4s}
    @keyframes dot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-7px);opacity:1}}

    /* INPUT */
    .input-wrap{padding:10px 14px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:rgba(16,16,30,.92);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
    textarea{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:14px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14.5px;padding:11px 14px;resize:none;outline:none;min-height:46px;max-height:130px;line-height:1.5;transition:border-color .2s}
    textarea::placeholder{color:var(--muted)}
    textarea:focus{border-color:var(--acc)}
    .send{width:46px;height:46px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--acc),#a78bff);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 18px rgba(124,111,255,.4);transition:transform .15s,opacity .15s}
    .send:active{transform:scale(.91)}
    .send:disabled{opacity:.35;cursor:not-allowed}

    /* TOAST */
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#ef4444;color:#fff;padding:10px 22px;border-radius:99px;font-size:13px;z-index:99;white-space:nowrap;display:none;pointer-events:none;font-family:'Tajawal',sans-serif}
    .toast.ok{background:#22c55e}
    .toast.show{display:block;animation:fadeUp .3s ease}
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="av">🤖</div>
    <div class="hinfo">
      <h1>مساعد ذكي AI</h1>
      <p>Claude Powered · متصل</p>
    </div>
    <button class="hbtn" onclick="toggleSetup()">⚙️ API Key</button>
  </header>

  <div class="setup" id="setup">
    <b>🔑 أدخل مفتاح Anthropic API:</b><br>
    احصل عليه مجاناً من <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
    <div class="krow">
      <input type="password" id="keyInput" placeholder="sk-ant-api03-..."/>
      <button onclick="saveKey()">حفظ ✓</button>
    </div>
  </div>

  <div class="chat" id="chat">
    <div class="welcome" id="welcome">
      <span class="wicon">✨</span>
      <h2>أهلاً! كيف أساعدك؟</h2>
      <p>اسألني أي شيء — بالعربي أو الإنجليزي</p>
      <div class="chips">
        <button class="chip" onclick="quick('اشرح لي الذكاء الاصطناعي ببساطة')">🧠 الذكاء الاصطناعي</button>
        <button class="chip" onclick="quick('اكتب كود Python يطبع مرحباً')">💻 كود Python</button>
        <button class="chip" onclick="quick('اقترح 5 أفكار مشاريع تقنية مربحة')">🚀 أفكار مشاريع</button>
        <button class="chip" onclick="quick('ترجم: How are you doing today?')">🌍 ترجمة</button>
        <button class="chip" onclick="quick('اكتب قصيدة قصيرة عن التكنولوجيا')">✍️ كتابة</button>
      </div>
    </div>
    <div class="typing" id="typing">
      <div class="typing-bub"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="input-wrap">
    <textarea id="inp" placeholder="اكتب رسالتك..." rows="1"
      onkeydown="onKey(event)" oninput="resize(this)"></textarea>
    <button class="send" id="sendBtn" onclick="send()">➤</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let history = [];
  let apiKey  = localStorage.getItem('ant_key') || '';

  if (!apiKey) document.getElementById('setup').classList.add('show');

  function toggleSetup() {
    document.getElementById('setup').classList.toggle('show');
  }

  function saveKey() {
    const k = document.getElementById('keyInput').value.trim();
    if (!k.startsWith('sk-ant')) return toast('مفتاح غير صحيح — يبدأ بـ sk-ant ❌');
    apiKey = k;
    localStorage.setItem('ant_key', k);
    document.getElementById('setup').classList.remove('show');
    toast('تم حفظ المفتاح ✅', true);
  }

  async function send() {
    const inp  = document.getElementById('inp');
    const text = inp.value.trim();
    if (!text) return;
    if (!apiKey) {
      document.getElementById('setup').classList.add('show');
      return toast('أدخل مفتاح API أولاً 🔑');
    }
    hideWelcome();
    addMsg(text, 'user');
    inp.value = ''; resize(inp);
    setLoading(true);
    history.push({ role:'user', content:text });

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type':      'application/json',
          'x-api-key':         apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model:      'claude-haiku-4-5-20251001',
          max_tokens: 1024,
          system:     'أنت مساعد ذكاء اصطناعي مفيد وودود. أجب بالعربية دائماً ما لم يسألك المستخدم بلغة أخرى.',
          messages:   history
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(()=>({}));
        throw new Error(err.error?.message || 'HTTP '+res.status);
      }

      const data  = await res.json();
      const reply = data.content?.[0]?.text || 'لا يوجد رد';
      history.push({ role:'assistant', content:reply });
      addMsg(reply, 'ai');

    } catch(e) {
      console.error(e);
      const m = e.message;
      toast(
        m.includes('401') ? 'مفتاح API خاطئ ⚙️' :
        m.includes('429') ? 'تجاوزت الحد — انتظر قليلاً ⏳' :
        'خطأ: ' + m
      );
      history.pop();
    } finally {
      setLoading(false);
    }
  }

  function quick(text) {
    document.getElementById('inp').value = text;
    send();
  }

  function addMsg(text, role) {
    const chat   = document.getElementById('chat');
    const typing = document.getElementById('typing');
    const div    = document.createElement('div');
    div.className = 'msg '+role;
    const now = new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
    div.innerHTML = `<div class="bubble">${esc(text)}</div><div class="msg-time">${now}</div>`;
    chat.insertBefore(div, typing);
    chat.scrollTop = chat.scrollHeight;
  }

  function esc(t){
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function hideWelcome(){
    const w = document.getElementById('welcome');
    if(w) w.remove();
  }

  function setLoading(on){
    document.getElementById('typing').classList.toggle('show', on);
    document.getElementById('sendBtn').disabled = on;
    document.getElementById('chat').scrollTop = 99999;
  }

  let _toastTid;
  function toast(msg, ok=false){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (ok?' ok':'');
    clearTimeout(_toastTid);
    _toastTid = setTimeout(()=> t.classList.remove('show'), 3500);
  }

  function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
  function resize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,130)+'px'; }
</script>
</body>
</html>
