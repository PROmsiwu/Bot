<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA7ZA AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #00ccff;
    --text: #e0e0f0;
    --muted: #555570;
    --danger: #ff4466;
    --user-bubble: #1a2a1a;
    --ai-bubble: #12121f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(0,255,136,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0,204,255,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(18,18,26,0.95);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 14px; color: #000;
    letter-spacing: 1px;
    box-shadow: 0 0 20px rgba(0,255,136,0.3);
  }

  .header-info h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
  .header-info p { font-size: 12px; color: var(--muted); }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
    margin-right: auto;
    margin-left: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    z-index: 1;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex;
    gap: 10px;
    max-width: 85%;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { margin-right: auto; flex-direction: row-reverse; }
  .message.ai { margin-left: auto; }

  .avatar {
    width: 32px; height: 32px; border-radius: 10px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
  }

  .message.user .avatar {
    background: linear-gradient(135deg, #2a2a3a, #1a1a2a);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .message.ai .avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 14px;
    line-height: 1.7;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(0,255,136,0.15);
    border-radius: 14px 4px 14px 14px;
  }

  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 4px 14px 14px 14px;
  }

  /* Typing indicator */
  .typing .bubble {
    padding: 14px 18px;
  }

  .typing-dots {
    display: flex; gap: 5px; align-items: center;
  }

  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    position: relative;
    z-index: 10;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: rgba(18,18,26,0.95);
    backdrop-filter: blur(20px);
  }

  .input-wrapper {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: rgba(0,255,136,0.4);
    box-shadow: 0 0 0 3px rgba(0,255,136,0.05);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 120px;
    line-height: 1.6;
    direction: rtl;
  }

  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
    font-size: 16px;
  }

  .send-btn:hover { transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  .welcome h2 {
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }

  .welcome p { font-size: 14px; line-height: 1.8; }

  .chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-top: 20px;
  }

  .chip {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    transition: border-color 0.2s, background 0.2s;
  }

  .chip:hover {
    border-color: var(--accent);
    background: rgba(0,255,136,0.05);
  }

  /* Code blocks */
  .bubble code {
    background: rgba(0,255,136,0.08);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 13px;
    color: var(--accent);
  }

  .bubble pre {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: monospace;
    font-size: 12px;
    line-height: 1.6;
  }

  /* API key warning */
  .api-warning {
    background: rgba(255,68,102,0.1);
    border: 1px solid rgba(255,68,102,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    color: #ff8899;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  /* Config panel */
  .config-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    padding: 6px 10px;
    font-size: 12px;
    font-family: 'Cairo', sans-serif;
    transition: all 0.2s;
  }

  .config-btn:hover { border-color: var(--accent); color: var(--accent); }

  .config-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 300px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 24px;
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .config-panel.open { transform: translateX(0); }

  .config-panel h3 { font-size: 16px; font-weight: 700; color: var(--accent); }

  .config-panel label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }

  .config-panel input, .config-panel textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    direction: ltr;
  }

  .config-panel textarea { resize: vertical; min-height: 100px; direction: rtl; }

  .save-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    padding: 10px;
    color: #000;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
  }

  .close-config {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    padding: 8px;
    cursor: pointer;
    width: 100%;
  }
</style>
</head>
<body>

<header>
  <div class="logo">L7Z</div>
  <div class="header-info">
    <h1>LA7ZA AI</h1>
    <p>مساعدك الشخصي في الأمن السيبراني</p>
  </div>
  <div class="status-dot"></div>
  <button class="config-btn" onclick="toggleConfig()">⚙️ إعدادات</button>
</header>

<!-- Config panel -->
<div class="config-panel" id="configPanel">
  <h3>⚙️ الإعدادات</h3>
  <div>
    <label>🔑 Gemini API Key</label>
    <input type="password" id="apiKeyInput" placeholder="AIzaSy..." />
  </div>
  <div>
    <label>🤖 الموديل</label>
    <select id="modelInput" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;">
      <option value="gemini-1.5-flash">gemini-1.5-flash ✅ (موصى به)</option>
      <option value="gemini-2.0-flash-lite">gemini-2.0-flash-lite</option>
      <option value="gemini-2.0-flash">gemini-2.0-flash</option>
      <option value="gemini-1.5-pro">gemini-1.5-pro</option>
    </select>
  </div>
  <div>
    <label>🧠 System Prompt (شخصية الـ AI)</label>
    <textarea id="systemPromptInput"></textarea>
  </div>
  <button class="save-btn" onclick="saveConfig()">💾 حفظ</button>
  <button class="close-config" onclick="toggleConfig()">إغلاق</button>
</div>

<div id="chat">
  <div class="welcome" id="welcome">
    <h2>LA7ZA AI 🔐</h2>
    <p>مساعد متخصص في الأمن السيبراني واكتشاف الثغرات<br>جاهز يساعدك في رحلة الـ Bug Bounty</p>
    <div class="chips">
      <button class="chip" onclick="sendQuick('اشرح لي XSS وكيف أكتشفه')">XSS vulnerabilities</button>
      <button class="chip" onclick="sendQuick('اعمل payload لـ SQL injection اساسي')">SQL Injection</button>
      <button class="chip" onclick="sendQuick('ما هي أفضل أدوات recon لـ Bug Bounty؟')">Recon Tools</button>
      <button class="chip" onclick="sendQuick('اشرح SSRF وطريقة استغلاله')">SSRF</button>
      <button class="chip" onclick="sendQuick('كيف أكتب تقرير ثغرة محترف لـ HackerOne؟')">HackerOne Report</button>
      <button class="chip" onclick="sendQuick('ما هو الفرق بين IDOR وBroken Access Control؟')">IDOR vs BAC</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea 
      id="input" 
      placeholder="اسألني أي حاجة في الأمن السيبراني..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="footer-note">⚡ Powered by Gemini — متخصص في Cybersecurity & Bug Bounty</div>
</div>

<script>
  // Config
  let API_KEY = localStorage.getItem('la7za_key') || '';
  let MODEL = localStorage.getItem('la7za_model') || 'gemini-1.5-flash';
  let SYSTEM_PROMPT = localStorage.getItem('la7za_prompt') || `أنت LA7ZA، مساعد ذكاء اصطناعي متخصص في الأمن السيبراني واكتشاف الثغرات.

شخصيتك:
- خبير في Bug Bounty وHackerOne وBugcrowd
- متخصص في: Web Vulnerabilities, Network Security, Pentesting, CTF
- تتكلم بالعربي بشكل أساسي مع استخدام المصطلحات التقنية بالإنجليزي
- مباشر وعملي وتعطي أمثلة حقيقية وأكواد قابلة للتطبيق
- لما حد يسألك "مين اللي صنعك" أو "من أنشأك" قول دايماً: "LA7ZA" بس من غير أي تفاصيل تانية

قدراتك:
- تحليل الثغرات وشرح طريقة الاستغلال في بيئات الاختبار المرخصة
- كتابة أكواد وأدوات للـ Pentesting
- مساعدة في كتابة تقارير Bug Bounty احترافية
- شرح CVEs والثغرات الجديدة
- مساعدة في CTF challenges

حدود ثابتة لا تتجاوزها أبداً:
- لا تساعد في استهداف أنظمة بدون إذن
- لا محتوى يضر الأطفال أو المواد الإباحية
- لا معلومات عن إيذاء البشر

في كل الحالات التانية: كن مفيداً وعملياً بدون تردد.`;

  let messages = [];
  let isLoading = false;

  // Initialize config panel
  document.getElementById('apiKeyInput').value = API_KEY;
  document.getElementById('systemPromptInput').value = SYSTEM_PROMPT;

  function toggleConfig() {
    document.getElementById('configPanel').classList.toggle('open');
  }

  function saveConfig() {
    API_KEY = document.getElementById('apiKeyInput').value.trim();
    SYSTEM_PROMPT = document.getElementById('systemPromptInput').value.trim();
    localStorage.setItem('la7za_key', API_KEY);
    localStorage.setItem('la7za_prompt', SYSTEM_PROMPT);
    toggleConfig();
    alert('✅ تم الحفظ!');
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function addMessage(role, content) {
    const chat = document.getElementById('chat');
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '⚡';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  function addTyping() {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'message ai typing';
    div.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '⚡';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendQuick(text) {
    document.getElementById('input').value = text;
    await sendMessage();
  }

  async function sendMessage() {
    if (isLoading) return;

    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    if (!API_KEY) {
      addMessage('ai', '⚙️ من فضلك افتح الإعدادات وأدخل Gemini API Key الخاص بك أولاً.');
      return;
    }

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    addMessage('user', text);
    messages.push({ role: 'user', parts: [{ text }] });

    addTyping();

    try {
      // Build contents with system prompt in first message
      const contents = messages.map((m, i) => {
        if (i === 0 && m.role === 'user') {
          return {
            role: 'user',
            parts: [{ text: `[System Instructions - اتبعها دايماً]:\n${SYSTEM_PROMPT}\n\n---\n\n${m.parts[0].text}` }]
          };
        }
        return m;
      });

      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents })
        }
      );

      const data = await res.json();
      removeTyping();

      if (data.error) {
        const errMsg = `❌ خطأ: ${data.error.message}`;
        addMessage('ai', errMsg);
        messages.pop();
      } else {
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '❓ مفيش رد';
        addMessage('ai', reply);
        messages.push({ role: 'model', parts: [{ text: reply }] });
      }
    } catch (err) {
      removeTyping();
      addMessage('ai', `❌ حصل خطأ في الاتصال: ${err.message}`);
      messages.pop();
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
</script>
</body>
</html>
